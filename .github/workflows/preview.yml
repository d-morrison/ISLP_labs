name: PR preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      TZ: America/Los_Angeles
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        if: github.event.action != 'closed'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-website.txt

      - name: Install Python dependencies for chunk execution
        if: github.event.action != 'closed'
        run: pip install -r requirements-website.txt

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b  # v2
        with:
          tinytex: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Render (solution)
        if: github.event.action != 'closed'
        uses: quarto-dev/quarto-actions/render@8a96df13519ee81fd526f2dfca5962811136661b  # v2
        env:
          QUARTO_PROFILE: solution

      - name: Render (assign)
        if: github.event.action != 'closed'
        uses: quarto-dev/quarto-actions/render@8a96df13519ee81fd526f2dfca5962811136661b  # v2
        env:
          QUARTO_PROFILE: assign

      - name: Create landing page
        if: github.event.action != 'closed'
        run: bash .github/scripts/create-landing-page.sh

      - name: Deploy PR preview
        id: preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9  # v1
        with:
          source-dir: ./_site/
          action: ${{ github.event.action == 'closed' && 'remove' || 'deploy' }}
          comment: false

      - name: Comment with preview link
        if: steps.preview.outputs.deployment-action == 'deploy'
        uses: marocchino/sticky-pull-request-comment@447031a6bb83f7438d890bb0136932be78342022  # v3
        with:
          header: pr-preview
          recreate: true
          message: |
            [PR Preview Action](https://github.com/rossjrw/pr-preview-action) ${{ steps.preview.outputs.action-version }}
            :---:
            :rocket: **Preview available at:** ${{ steps.preview.outputs.preview-url }}

            <sub>Built to branch [`gh-pages`](${{ github.server_url }}/${{ github.repository }}/tree/gh-pages) at ${{ steps.preview.outputs.action-start-time }}.</sub>

      - name: Remove preview comment
        if: steps.preview.outputs.deployment-action == 'remove'
        uses: marocchino/sticky-pull-request-comment@447031a6bb83f7438d890bb0136932be78342022  # v3
        with:
          header: pr-preview
          message: |
            [PR Preview Action](https://github.com/rossjrw/pr-preview-action) ${{ steps.preview.outputs.action-version }}
            :---:
            Preview removed because the pull request was closed.

            <sub>${{ steps.preview.outputs.action-start-time }}</sub>
