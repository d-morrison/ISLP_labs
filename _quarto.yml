project:
  type: website
  output-dir: _site
  render:
    - "index.qmd"
    - "Ch07-nonlin-lab.qmd"

profile:
  default: solution

# Python chunks in `Ch07-nonlin-lab.qmd` execute at render time so the
# rendered handout shows real figures, tables, and console output (not
# just the code as text). The publish + preview workflows install the
# subset of `requirements.txt` needed for the website in
# `requirements-website.txt`. `freeze: auto` keeps repeat renders fast
# by skipping re-execution when the source has not changed.
execute:
  warning: false
  message: false
  cache: false
  freeze: auto

filters:
  - assign
  - d-morrison/div-anchors
  - d-morrison/equation-anchors
  - d-morrison/callouty-theorem
  - coatless-quarto/custom-callout

website:
  title: "ISLP Labs"
  description: "Quarto handouts for the *Introduction to Statistical Learning with Applications in Python* labs."
  back-to-top-navigation: true
  page-navigation: true
  reader-mode: true
  repo-url: https://github.com/d-morrison/ISLP_labs
  repo-branch: stable
  repo-actions: [edit, issue, source]
  page-footer:
    center: |
      Lab content adapted from
      [statlearning.com](https://www.statlearning.com) ·
      Built with [Quarto](https://quarto.org)
  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "Handouts"
        menu:
          - text: "Ch. 7 — Non-Linear Modeling"
            href: Ch07-nonlin-lab.qmd
      - text: "Original labs"
        href: https://github.com/intro-stat-learning/ISLP_labs
    right:
      - icon: github
        href: https://github.com/d-morrison/ISLP_labs
        aria-label: GitHub

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-location: right
    toc-depth: 3
    anchor-sections: true
    code-fold: false
    code-tools: true
    code-link: true
    highlight-style: pygments
    link-external-icon: true
    fig-cap-location: top
    html-math-method: mathjax
    df-print: paged
  revealjs:
    # Per-document `output-file:` overrides in each .qmd disambiguate the
    # revealjs `.html` from the primary html format (both target `.html`
    # by default and would otherwise collide on rename).
    theme: simple
    slide-number: true
    preview-links: auto
    incremental: false
    fig-cap-location: top
    html-math-method: mathjax
    code-fold: false
    code-link: true
    scrollable: true
    smaller: true
    progress: true
    transition: slide
  pdf:
    pdf-engine: lualatex
    geometry:
      - top=20mm
      - bottom=20mm
      - left=20mm
      - right=20mm
    fig-cap-location: top
    number-sections: true
    number-depth: 3

date: last-modified
date-format: "[Last modified:] YYYY-MM-DD"
